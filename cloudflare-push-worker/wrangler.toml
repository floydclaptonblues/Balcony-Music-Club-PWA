name = "bmc-show-alerts"
main = "src/index.ts"
compatibility_date = "2026-06-19"

# Replace after Cloudflare setup.
# Run: npx wrangler kv namespace create BMC_PUSH_SUBSCRIPTIONS
# Then paste the returned id below.
[[kv_namespaces]]
binding = "PUSH_SUBSCRIPTIONS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
ALLOWED_ORIGIN = "https://floydclaptonblues.github.io"
VAPID_SUBJECT = "mailto:BMC@marullomgmt.com"
VAPID_PUBLIC_KEY = "REPLACE_WITH_VAPID_PUBLIC_KEY"
LATEST_ANNOUNCEMENT_KEY = "latest-announcement"
