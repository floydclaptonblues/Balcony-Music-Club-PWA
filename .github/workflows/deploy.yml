name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: corepack pnpm install --lockfile=false
      - name: Validate push configuration
        run: |
          node - <<'NODE'
          const required = ['VITE_BMC_PUSH_API_URL', 'VITE_BMC_VAPID_PUBLIC_KEY'];
          const missing = required.filter((name) => !process.env[name]);
          if (missing.length) {
            console.error(`Missing required GitHub Actions variable(s): ${missing.join(', ')}`);
            process.exit(1);
          }
          NODE
        env:
          VITE_BMC_PUSH_API_URL: ${{ vars.VITE_BMC_PUSH_API_URL }}
          VITE_BMC_VAPID_PUBLIC_KEY: ${{ vars.VITE_BMC_VAPID_PUBLIC_KEY }}
      - name: Write public push configuration
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const config = {
            apiUrl: process.env.VITE_BMC_PUSH_API_URL,
            vapidPublicKey: process.env.VITE_BMC_VAPID_PUBLIC_KEY,
          };
          fs.mkdirSync('public', { recursive: true });
          fs.writeFileSync('public/push-config.js', `window.BMC_PUSH_CONFIG = ${JSON.stringify(config)};\n`);
          NODE
        env:
          VITE_BMC_PUSH_API_URL: ${{ vars.VITE_BMC_PUSH_API_URL }}
          VITE_BMC_VAPID_PUBLIC_KEY: ${{ vars.VITE_BMC_VAPID_PUBLIC_KEY }}
      - name: Build
        run: corepack pnpm run build
        env:
          GITHUB_PAGES: 'true'
          GITHUB_PAGES_CUSTOM_DOMAIN: 'true'
          VITE_BMC_PUSH_API_URL: ${{ vars.VITE_BMC_PUSH_API_URL }}
          VITE_BMC_VAPID_PUBLIC_KEY: ${{ vars.VITE_BMC_VAPID_PUBLIC_KEY }}
      - name: Ensure push files and override are in artifact
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const config = {
            apiUrl: process.env.VITE_BMC_PUSH_API_URL,
            vapidPublicKey: process.env.VITE_BMC_VAPID_PUBLIC_KEY,
          };

          fs.mkdirSync('dist', { recursive: true });
          fs.writeFileSync('dist/push-config.js', `window.BMC_PUSH_CONFIG = ${JSON.stringify(config)};\n`);

          const overrideSource = path.join('public', 'bmc-push-override.js');
          const overrideTarget = path.join('dist', 'bmc-push-override.js');
          if (!fs.existsSync(overrideSource)) {
            console.error('Missing public/bmc-push-override.js');
            process.exit(1);
          }
          fs.copyFileSync(overrideSource, overrideTarget);

          const indexPath = path.join('dist', 'index.html');
          if (!fs.existsSync(indexPath)) {
            console.error('Missing dist/index.html');
            process.exit(1);
          }
          let html = fs.readFileSync(indexPath, 'utf8');
          if (!html.includes('bmc-push-override.js')) {
            const tag = `<script src="bmc-push-override.js?v=${process.env.GITHUB_SHA || 'local'}"></script>`;
            html = html.replace(/\s*<\/body>/i, `\n  ${tag}\n</body>`);
            fs.writeFileSync(indexPath, html);
          }
          NODE
        env:
          VITE_BMC_PUSH_API_URL: ${{ vars.VITE_BMC_PUSH_API_URL }}
          VITE_BMC_VAPID_PUBLIC_KEY: ${{ vars.VITE_BMC_VAPID_PUBLIC_KEY }}
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
