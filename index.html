<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#120728" />
  <title>Balcony Music Club</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#120728;color:#fff8ea;min-height:100vh;display:grid;place-items:center;padding:24px}main{max-width:720px}h1{font-size:clamp(2.5rem,12vw,5rem);line-height:.95;margin:0 0 16px}p{font-size:1.1rem;line-height:1.55;color:#d8c9f1}.card{border:1px solid rgba(255,255,255,.18);border-radius:24px;padding:22px;background:rgba(255,255,255,.08)}.pill{display:inline-block;border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:8px 12px;margin:5px;color:#fff8ea}.note{font-size:.95rem;color:#bdaedf}
  </style>
</head>
<body>
  <main>
    <p class="note">QR-ready guest app</p>
    <h1>Balcony Music Club</h1>
    <section class="card">
      <p>Welcome to Balcony Music Club — the Center of the Universe. No cover, no charge.</p>
      <p>504 Esplanade Avenue, New Orleans, Louisiana</p>
      <div><span class="pill">Courtyard</span><span class="pill">Main stage</span><span class="pill">Balcony bar</span></div>
      <p class="note">No live video. No checkout. No real push notifications in this version.</p>
    </section>
  </main>
</body>
</html>
